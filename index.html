<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Quiz de notes</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #fdf2f8);
      min-height: 100vh;
      text-align: center;
      color: #222;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 30px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .score {
      font-size: 24px;
      font-weight: bold;
      margin: 15px;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 25px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.12);
      margin-top: 20px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 20px;
      margin: 8px;
      font-size: 17px;
      cursor: pointer;
      background: #4f46e5;
      color: white;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      background: #3730a3;
    }

    .note-btn {
      background: #111827;
      min-width: 70px;
    }

    .note-btn:hover {
      background: #000;
    }

    .message {
      font-size: 22px;
      font-weight: bold;
      min-height: 32px;
      margin-top: 15px;
    }

    svg {
      width: 100%;
      max-width: 900px;
      height: 300px;
      margin-top: 20px;
    }

    .shake {
      animation: shake 0.25s;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      50% { transform: translateX(8px); }
      75% { transform: translateX(-8px); }
      100% { transform: translateX(0); }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🎼 Quiz de notes</h1>

    <div class="score">Score : <span id="score">0</span></div>

    <button onclick="changerClef('sol')">Clef de sol</button>
    <button onclick="changerClef('fa')">Clef de fa</button>
    <button onclick="genererPortee()">Nouvelle portée</button>

    <div class="card">
      <svg id="partition" viewBox="0 0 900 300"></svg>

      <div>
        <button class="note-btn" onclick="repondre('Do')">Do</button>
        <button class="note-btn" onclick="repondre('Ré')">Ré</button>
        <button class="note-btn" onclick="repondre('Mi')">Mi</button>
        <button class="note-btn" onclick="repondre('Fa')">Fa</button>
        <button class="note-btn" onclick="repondre('Sol')">Sol</button>
        <button class="note-btn" onclick="repondre('La')">La</button>
        <button class="note-btn" onclick="repondre('Si')">Si</button>
      </div>

      <div class="message" id="message"></div>
    </div>
  </div>

  <script>
    const svg = document.getElementById("partition");
    const scoreElement = document.getElementById("score");
    const message = document.getElementById("message");

    let clefActuelle = "sol";
    let score = 0;
    let notesGenerees = [];
    let noteActuelle = 0;

    const notesSol = [
      { nom: "Do", y: 190 },
      { nom: "Ré", y: 180 },
      { nom: "Mi", y: 170 },
      { nom: "Fa", y: 160 },
      { nom: "Sol", y: 150 },
      { nom: "La", y: 140 },
      { nom: "Si", y: 130 },
      { nom: "Do", y: 120 },
      { nom: "Ré", y: 110 },
      { nom: "Mi", y: 100 },
      { nom: "Fa", y: 90 }
    ];

    const notesFa = [
      { nom: "Do", y: 170 },
      { nom: "Ré", y: 160 },
      { nom: "Mi", y: 150 },
      { nom: "Fa", y: 140 },
      { nom: "Sol", y: 130 },
      { nom: "La", y: 120 },
      { nom: "Si", y: 110 },
      { nom: "Do", y: 100 },
      { nom: "Ré", y: 90 },
      { nom: "Mi", y: 80 }
    ];

    function creerElement(type, attributs) {
      const element = document.createElementNS("http://www.w3.org/2000/svg", type);

      for (let attr in attributs) {
        element.setAttribute(attr, attributs[attr]);
      }

      svg.appendChild(element);
      return element;
    }

    function dessinerPortee() {
      svg.innerHTML = "";

      const departY = 90;
      const espace = 20;

      for (let i = 0; i < 5; i++) {
        creerElement("line", {
          x1: 90,
          y1: departY + i * espace,
          x2: 840,
          y2: departY + i * espace,
          stroke: "black",
          "stroke-width": 2
        });
      }
    }

    function dessinerClef() {
      creerElement("text", {
        x: 25,
        y: 155,
        "font-size": 72
      }).textContent = clefActuelle === "sol" ? "𝄞" : "𝄢";
    }

    function dessinerNote(x, y, active) {
      creerElement("ellipse", {
        cx: x,
        cy: y,
        rx: 13,
        ry: 9,
        fill: active ? "#ef4444" : "black",
        transform: `rotate(-20 ${x} ${y})`
      });

      creerElement("line", {
        x1: x + 11,
        y1: y,
        x2: x + 11,
        y2: y - 55,
        stroke: active ? "#ef4444" : "black",
        "stroke-width": 2
      });
    }

    function genererPortee() {
      message.textContent = "";
      notesGenerees = [];
      noteActuelle = 0;

      const listeNotes = clefActuelle === "sol" ? notesSol : notesFa;

      for (let i = 0; i < 10; i++) {
        const note = listeNotes[Math.floor(Math.random() * listeNotes.length)];
        notesGenerees.push(note);
      }

      afficherNotes();
    }

    function afficherNotes() {
      dessinerPortee();
      dessinerClef();

      for (let i = 0; i < notesGenerees.length; i++) {
        const x = 140 + i * 70;
        dessinerNote(x, notesGenerees[i].y, i === noteActuelle);
      }
    }

    function repondre(reponse) {
      const bonneNote = notesGenerees[noteActuelle].nom;

      if (reponse === bonneNote) {
        score++;
        scoreElement.textContent = score;

        message.textContent = "✅ Bonne réponse !";
        message.style.color = "#16a34a";

        noteActuelle++;

        if (noteActuelle >= notesGenerees.length) {
          message.textContent = "🎉 Portée terminée ! Nouvelle portée générée.";
          setTimeout(genererPortee, 800);
        } else {
          afficherNotes();
        }
      } else {
        score = 0;
        scoreElement.textContent = score;

        message.textContent = "❌ Mauvaise réponse ! Essaie encore.";
        message.style.color = "#dc2626";

        if (navigator.vibrate) {
          navigator.vibrate(0);
          setTimeout(() => {
            navigator.vibrate([120, 40, 120]);
          }, 20);
        }

        svg.classList.remove("shake");
        void svg.offsetWidth;
        svg.classList.add("shake");
      }
    }

    function changerClef(clef) {
      clefActuelle = clef;
      score = 0;
      scoreElement.textContent = score;
      genererPortee();
    }

    genererPortee();
  </script>
</body>
</html>
