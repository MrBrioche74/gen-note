<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Quiz de notes</title>

  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" href="icon.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Quiz de notes">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      min-height: 100vh;
      text-align: center;
      color: #111827;
      background:
        radial-gradient(circle at top left, #ddd6fe, transparent 35%),
        radial-gradient(circle at bottom right, #fbcfe8, transparent 35%),
        linear-gradient(135deg, #f8fafc, #eef2ff);
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 25px 14px;
    }

    .title {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
    }

    .icon {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      background: linear-gradient(135deg, #4f46e5, #ec4899);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      box-shadow: 0 12px 25px rgba(79, 70, 229, 0.3);
    }

    h1 {
      font-size: 42px;
      margin: 0;
      letter-spacing: -1px;
    }

    .subtitle {
      color: #6b7280;
      font-size: 18px;
      margin-bottom: 18px;
    }

    .score-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .score-box {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: white;
      padding: 10px 20px;
      border-radius: 999px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      font-size: 22px;
      font-weight: 700;
    }

    .score-number {
      background: #4f46e5;
      color: white;
      min-width: 42px;
      padding: 4px 12px;
      border-radius: 999px;
    }

    .record-animation {
      animation: recordPop 0.45s ease;
    }

    @keyframes recordPop {
      0% { transform: scale(1); }
      40% { transform: scale(1.25); background: #f59e0b; }
      70% { transform: scale(0.95); }
      100% { transform: scale(1); }
    }

    .controls {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .control-btn {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      box-shadow: 0 10px 22px rgba(79, 70, 229, 0.25);
    }

    .control-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(79, 70, 229, 0.35);
    }

    .card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      padding: 22px 10px 24px;
      box-shadow: 0 25px 70px rgba(31, 41, 55, 0.16);
      border: 1px solid rgba(255,255,255,0.7);
    }

    .staff-wrapper {
      background: linear-gradient(180deg, #ffffff, #f9fafb);
      border-radius: 24px;
      padding: 8px;
      border: 1px solid #eef2f7;
      overflow-x: auto;
    }

    svg {
      width: 100%;
      max-width: 1100px;
      height: 420px;
    }

    .answers {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .note-btn {
      min-width: 82px;
      background: #111827;
      color: white;
      box-shadow: 0 8px 18px rgba(17, 24, 39, 0.2);
      font-size: 22px;
      padding: 16px 20px;
    }

    .note-btn:hover {
      transform: translateY(-2px);
      background: #374151;
    }

    .message {
      font-size: 24px;
      font-weight: 800;
      min-height: 34px;
      margin-top: 22px;
    }

    .shake {
      animation: shake 0.25s;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      50% { transform: translateX(10px); }
      75% { transform: translateX(-10px); }
      100% { transform: translateX(0); }
    }

    @media (max-width: 600px) {

      h1 {
        font-size: 34px;
      }

      .subtitle {
        font-size: 16px;
      }

      .score-box {
        font-size: 18px;
      }

      .note-btn {
        min-width: 72px;
        font-size: 20px;
      }

      svg {
        height: 480px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="title">
      <div class="icon">🎼</div>
      <h1>Quiz de notes</h1>
    </div>

    <div class="subtitle">
      Trouve la note rouge pour faire monter ton score
    </div>

    <div class="score-row">

      <div class="score-box">
        Score
        <span class="score-number" id="score">0</span>
      </div>

      <div class="score-box">
        Highest
        <span class="score-number" id="highscore">0</span>
      </div>

    </div>

    <div class="controls">
      <button class="control-btn" onclick="changerClef('sol')">
        🎼 Clef de sol
      </button>

      <button class="control-btn" onclick="changerClef('fa')">
        𝄢 Clef de fa
      </button>

      <button class="control-btn" onclick="genererPortee()">
        🔄 Nouvelle portée
      </button>
    </div>

    <div class="card">

      <div class="staff-wrapper">
        <svg id="partition" viewBox="0 0 1100 420"></svg>
      </div>

      <div class="answers">
        <button class="note-btn" onclick="repondre('Do')">Do</button>
        <button class="note-btn" onclick="repondre('Ré')">Ré</button>
        <button class="note-btn" onclick="repondre('Mi')">Mi</button>
        <button class="note-btn" onclick="repondre('Fa')">Fa</button>
        <button class="note-btn" onclick="repondre('Sol')">Sol</button>
        <button class="note-btn" onclick="repondre('La')">La</button>
        <button class="note-btn" onclick="repondre('Si')">Si</button>
      </div>

      <div class="message" id="message"></div>

    </div>

  </div>

  <script>

    const svg = document.getElementById("partition");
    const scoreElement = document.getElementById("score");
    const highscoreElement = document.getElementById("highscore");
    const message = document.getElementById("message");

    const staffTop = 120;
    const staffBottom = 232;
    const espace = 28;

    let clefActuelle = "sol";
    let score = 0;
    let highscore = Number(localStorage.getItem("highscoreNotes")) || 0;
    let notesGenerees = [];
    let noteActuelle = 0;

    highscoreElement.textContent = highscore;

    const notesSol = [
      { nom: "Do", y: 288 },
      { nom: "Ré", y: 260 },
      { nom: "Mi", y: 232 },
      { nom: "Fa", y: 204 },
      { nom: "Sol", y: 176 },
      { nom: "La", y: 148 },
      { nom: "Si", y: 120 },
      { nom: "Do", y: 92 },
      { nom: "Ré", y: 64 }
    ];

    const notesFa = [
      { nom: "Mi", y: 288 },
      { nom: "Fa", y: 260 },
      { nom: "Sol", y: 232 },
      { nom: "La", y: 204 },
      { nom: "Si", y: 176 },
      { nom: "Do", y: 148 },
      { nom: "Ré", y: 120 },
      { nom: "Mi", y: 92 },
      { nom: "Fa", y: 64 }
    ];

    function creerElement(type, attributs) {

      const element = document.createElementNS(
        "http://www.w3.org/2000/svg",
        type
      );

      for (let attr in attributs) {
        element.setAttribute(attr, attributs[attr]);
      }

      svg.appendChild(element);

      return element;
    }

    function dessinerPortee() {

      svg.innerHTML = "";

      for (let i = 0; i < 5; i++) {

        creerElement("line", {
          x1: 120,
          y1: staffTop + i * espace,
          x2: 1030,
          y2: staffTop + i * espace,
          stroke: "#111827",
          "stroke-width": 3,
          "stroke-linecap": "round"
        });
      }
    }

    function dessinerClef() {

      if (clefActuelle === "sol") {

        creerElement("text", {
          x: 24,
          y: 210,
          "font-size": 120,
          fill: "#111827"
        }).textContent = "𝄞";

      } else {

        creerElement("text", {
          x: 30,
          y: 192,
          "font-size": 98,
          fill: "#111827"
        }).textContent = "𝄢";
      }
    }

    function dessinerTraitsSupplementaires(x, y, couleur) {

      const largeurTrait = 54;
      const demiLargeur = largeurTrait / 2;

      if (y > staffBottom) {

        for (
          let ligne = staffBottom + espace;
          ligne <= y;
          ligne += espace
        ) {

          creerElement("line", {
            x1: x - demiLargeur,
            y1: ligne,
            x2: x + demiLargeur,
            y2: ligne,
            stroke: couleur,
            "stroke-width": 3,
            "stroke-linecap": "round"
          });
        }
      }

      if (y < staffTop) {

        for (
          let ligne = staffTop - espace;
          ligne >= y;
          ligne -= espace
        ) {

          creerElement("line", {
            x1: x - demiLargeur,
            y1: ligne,
            x2: x + demiLargeur,
            y2: ligne,
            stroke: couleur,
            "stroke-width": 3,
            "stroke-linecap": "round"
          });
        }
      }
    }

    function dessinerNote(x, y, active) {

      const couleur = active ? "#ef4444" : "#111827";

      dessinerTraitsSupplementaires(x, y, couleur);

      creerElement("ellipse", {
        cx: x,
        cy: y,
        rx: 18,
        ry: 13,
        fill: couleur,
        transform: `rotate(-20 ${x} ${y})`
      });

      creerElement("line", {
        x1: x + 14,
        y1: y,
        x2: x + 14,
        y2: y - 78,
        stroke: couleur,
        "stroke-width": 3,
        "stroke-linecap": "round"
      });
    }

    function genererPortee() {

      message.textContent = "";
      notesGenerees = [];
      noteActuelle = 0;

      const listeNotes =
        clefActuelle === "sol"
          ? notesSol
          : notesFa;

      for (let i = 0; i < 10; i++) {

        const note =
          listeNotes[
            Math.floor(Math.random() * listeNotes.length)
          ];

        notesGenerees.push(note);
      }

      afficherNotes();
    }

    function afficherNotes() {

      dessinerPortee();
      dessinerClef();

      for (let i = 0; i < notesGenerees.length; i++) {

        const x = 180 + i * 86;

        dessinerNote(
          x,
          notesGenerees[i].y,
          i === noteActuelle
        );
      }
    }

    function vibrationErreur() {

      if ("vibrate" in navigator) {

        navigator.vibrate(0);
        navigator.vibrate([150, 80, 150]);
      }
    }

    function animationErreur() {

      svg.classList.remove("shake");
      void svg.offsetWidth;
      svg.classList.add("shake");
    }

    function animationRecord() {

      highscoreElement.classList.remove("record-animation");
      void highscoreElement.offsetWidth;
      highscoreElement.classList.add("record-animation");
    }

    function verifierHighscore() {

      if (score > highscore) {

        highscore = score;

        highscoreElement.textContent = highscore;

        localStorage.setItem(
          "highscoreNotes",
          highscore
        );

        animationRecord();
      }
    }

    function repondre(reponse) {

      const bonneNote =
        notesGenerees[noteActuelle].nom;

      if (reponse === bonneNote) {

        score++;

        scoreElement.textContent = score;

        verifierHighscore();

        message.textContent =
          "✅ Bonne réponse !";

        message.style.color = "#16a34a";

        noteActuelle++;

        if (
          noteActuelle >= notesGenerees.length
        ) {

          message.textContent =
            "🎉 Portée terminée !";

          setTimeout(genererPortee, 800);

        } else {

          afficherNotes();
        }

      } else {

        score = 0;

        scoreElement.textContent = score;

        message.textContent =
          "❌ Mauvaise réponse !";

        message.style.color = "#dc2626";

        vibrationErreur();
        animationErreur();
      }
    }

    function changerClef(clef) {

      clefActuelle = clef;

      score = 0;

      scoreElement.textContent = score;

      genererPortee();
    }

    genererPortee();

  </script>

</body>
</html>
